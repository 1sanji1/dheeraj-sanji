<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dheeraj Sanji</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: white;
        padding: 20px;
        border-radius: 16px;
        text-align: center;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        animation: fadeIn 0.6s ease-in-out;
      }

      h1 {
        margin: 8px 0;
        font-size: 22px;
      }

      .intro {
        font-size: 14px;
        margin-bottom: 10px;
        line-height: 1.3;
        color: #444;
      }

      .highlight {
        color: #667eea;
        font-weight: bold;
      }

      p {
        margin: 4px 0;
        font-size: 13px;
        color: #444;
      }

      .button-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }

      .btn {
        padding: 12px;
        background: #667eea;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        transition: 0.3s;
        border: none;
        cursor: pointer;
      }

      .btn:hover {
        background: #5a67d8;
      }

      .links {
        margin-top: 10px;
      }

      .links a {
        display: block;
        padding: 8px;
        margin: 4px 0;
        background: #f5f5f5;
        border-radius: 8px;
        color: #333;
        text-decoration: none;
        font-weight: bold;
        font-size: 13px;
      }

      .email-box {
        margin-top: 4px;
        padding: 8px;
        background: #eef2ff;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
        word-break: break-all;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (min-width: 600px) {
        .button-group {
          flex-direction: row;
        }
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Hey there 👋</h1>

      <div class="intro">
        I’m <span class="highlight">Dheeraj Sanji</span>, an
        <span class="highlight">Early Career Software Engineer</span>
        focused on backend development, microservices, and cloud-based
        applications.
      </div>

      <p>Thanks for scanning!</p>
      <p>Check out my resume 👇</p>

      <div class="button-group">
        <a href="Dheeraj-Sanji-Resume.pdf" class="btn" download> ⬇ Download </a>

        <a href="Dheeraj-Sanji-Resume.pdf" target="_blank" class="btn">
          👀 Preview
        </a>
      </div>

      <div class="links">
        <a href="https://www.linkedin.com/in/dheeraj-sanji/" target="_blank">
          🔗 LinkedIn
        </a>

        <a href="mailto:dheerajsanji123@gmail.com"> 📧 Email Me </a>

        <div class="email-box" onclick="copyEmail()">
          dheerajsanji123@gmail.com 📋
        </div>
      </div>
    </div>

    <script>
      function copyEmail() {
        navigator.clipboard.writeText("dheerajsanji123@gmail.com");
        alert("Email copied!");
      }
    </script>
  </body>
</html>
